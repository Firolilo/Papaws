services:
  animales-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pawpaws-animales-api
    ports:
      - "8081:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Cassandra__ContactPoint: cassandra
      Cassandra__Port: 9042
      Cassandra__Keyspace: papaws_animales
    depends_on:
      - cassandra
    networks:
      - pawpaws-animales-net

  cassandra:
    image: cassandra:4.1
    container_name: pawpaws-animales-cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: pawpaws-animales
    ports:
      - "9042:9042"
    volumes:
      - pawpaws-animales-cassandra-data:/var/lib/cassandra
    networks:
      - pawpaws-animales-net

volumes:
  pawpaws-animales-cassandra-data:

networks:
  pawpaws-animales-net:
    driver: bridge
